name: Backend CI

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'server/**'
  pull_request:
    branches:
      - main
    paths:
      - 'server/**'

jobs:
  validate-backend:
    name: Backend Lint, Type Check, and Build
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        
      - name: Type Check
        run: npm run typecheck 

      # NEW STEP: Run the linter we just created
      - name: Run Linter
        run: npm run lint

      - name: Test Build
        run: npm run build