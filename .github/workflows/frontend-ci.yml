name: Frontend CI

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'spirits-fe/**'
  pull_request:
    branches:
      - main
    paths:
      - 'spirits-fe/**'

jobs:
  validate-frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./spirits-fe

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './spirits-fe/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Test Build & Type Check
        run: npm run build